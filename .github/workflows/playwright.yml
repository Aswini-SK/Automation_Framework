name: Playwright Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * *'   # daily at 6 AM

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ✅ YOUR STEP ADDED HERE
    - name: Set Environment Variables
      run: |
        echo "ENV=dev" >> $GITHUB_ENV

    - name: Install Dependencies
      working-directory: playwright_python_framework_for_DemoWebShop_old_version
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest playwright pytest-xdist allure-pytest
        python -m playwright install --with-deps

    - name: Debug Structure
      working-directory: playwright_python_framework_for_DemoWebShop_old_version
      run: |
        pwd
        ls -R

    - name: Run Tests
      working-directory: playwright_python_framework_for_DemoWebShop_old_version
      run: |
        pytest -n auto --alluredir=reports/allure
      env:
        PYTHONPATH: ${{ github.workspace }}/playwright_python_framework_for_DemoWebShop_old_version
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/allure

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs