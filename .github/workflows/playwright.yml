name: Playwright Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ✅ IMPORTANT: Fix for import issues
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=." >> $GITHUB_ENV

    - name: Set Environment Variables
      run: echo "ENV=dev" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install --with-deps

    # Optional (debug - you can remove later)
    - name: Debug Structure
      run: |
        pwd
        ls -R

    - name: Run Tests
      run: pytest -n auto --alluredir=reports/allure

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/allure

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs